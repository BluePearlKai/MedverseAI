<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedVerse AI - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-body">

<div class="particles"></div>

<div class="auth-container">
    <img src="assets/images/logo.png" class="logo">
    <h1>Welcome to MedVerse AI</h1>
    <p class="tagline">Simplify. Understand. Heal.</p>
    
    <div class="features">
        <p>✔ AI-powered health insights</p>
        <p>✔ Fast & secure diagnosis support</p>
        <p>✔ Available 24/7 for assistance</p>
    </div>

    <div class="login-box">
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password">

        <div class="extra-links">
            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" onclick="login()">Sign In</button>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="google-btn">Continue with Google</button>
        <button class="facebook-btn">Continue with Facebook</button>

        <p class="signup-text">
            Don't have an account? <a href="signup.html">Create Account</a>
        </p>
    </div>
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
