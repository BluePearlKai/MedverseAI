<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedVerse AI - Create Account</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-body">
    <div class="particles"></div>
    <div class="auth-container">
        <div class="logo-box">
            <img src="assets/images/logo.png" class="logo">
            <h1>Create Account</h1>
            <p class="tagline">Join the future of medical analysis</p>
        </div>

        <form class="login-box" onsubmit="handleSignup(event)">
            <input type="text" id="fullname" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Create Password" required>
            
            <button type="submit" class="login-btn" style="margin-top: 15px;">Save & Continue</button>
        </form>

        <div class="signup-text" style="margin-top: 20px;">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
<script src="assets/js/script.js"></script>
</body>
</html>
