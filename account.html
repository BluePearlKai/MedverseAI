<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedVerse AI - Account</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
    /* Overrides for specific layout requirements */
    body {
        display: block !important;
        overflow-y: auto !important;
    }
    
    /* 1. General Layout - Navigation Bar */
    nav {
        padding: 15px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .nav-logo {
        width: 35px;
    }

    .nav-links {
        flex: 1;
        display: flex;
        justify-content: center; /* Centered menu links */
        gap: 30px;
    }

    .nav-links a {
        color: #d1d5db;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
    }

    .nav-links a:hover, .nav-links a.active {
        color: white;
    }

    /* Search/Bag Icons on right */
    .nav-icons {
        display: flex;
        gap: 20px;
        align-items: center;
    }
    
    .nav-icon {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: #d1d5db;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        cursor: pointer;
    }

    /* Main Container - Two Column Layout */
    .account-container {
        display: flex;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
        gap: 40px;
        align-items: flex-start;
        min-height: calc(100vh - 140px);
    }

    /* Sidebar (Left) - ~25% width */
    .sidebar {
        width: 25%;
        flex-shrink: 0;
    }

    .profile-summary {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
    }

    .avatar-placeholder {
        width: 80px;
        height: 80px;
        background-color: rgba(255,255,255,0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        color: #d1d5db;
    }

    .profile-name {
        font-size: 18px;
        font-weight: 700;
        color: white;
        margin: 0;
    }

    .profile-email {
        font-size: 14px;
        color: #9ca3af;
        margin-top: 5px;
    }

    .sidebar-menu {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .menu-item {
        padding: 12px 16px;
        border-radius: 8px;
        text-decoration: none;
        color: #d1d5db;
        font-weight: 500;
        font-size: 15px;
        display: flex;
        align-items: center;
        transition: 0.2s;
    }

    .menu-item:hover {
        background-color: rgba(255,255,255,0.1);
    }

    .menu-item.active {
        background-color: rgba(249, 115, 22, 0.15); /* Transparent orange bg */
        color: #f97316; /* Orange text */
    }

    /* Content Area (Right) */
    .content-area {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(0, 234, 255, 0.25);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 40px;
        position: relative;
    }

    .content-header {
        margin-bottom: 40px;
    }

    .page-title {
        font-size: 28px;
        font-weight: 700;
        color: white;
        margin: 0 0 8px 0;
    }

    .page-subtitle {
        color: #9ca3af;
        font-size: 15px;
    }

    /* Sign out button */
    .sign-out-btn {
        position: absolute;
        top: 40px;
        right: 40px;
        background: linear-gradient(90deg, #00eaff, #007bff);
        color: #00131d;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
    }

    .sign-out-btn:hover {
        box-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
    }

    /* Grid Layout */
    .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px; /* gap-6 */
    }

    .info-card {
        border: 1px solid rgba(0,234,255,0.2);
        border-radius: 12px;
        padding: 32px; /* p-8 */
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        background: rgba(255,255,255,0.05);
    }

    .card-data {
        display: flex;
        flex-direction: column;
    }

    .card-label {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 8px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .card-value {
        font-size: 16px;
        color: white;
        font-weight: 600;
    }

    .card-icon {
        width: 20px;
        height: 20px;
        color: #00eaff;
        flex-shrink: 0;
    }

    /* Editable Inputs */
    .card-value-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid transparent;
        color: white;
        font-size: 16px;
        font-weight: 600;
        font-family: inherit;
        width: 100%;
        outline: none;
        transition: 0.3s;
        padding: 2px 0;
    }

    .card-value-input:focus {
        border-bottom: 1px solid #00eaff;
    }
    
    /* Footer Adjustment */
    .disclaimer {
        background: transparent;
        color: #6b7280;
        position: relative;
        margin-top: auto;
    }

    .save-btn {
        background: linear-gradient(90deg, #00eaff, #007bff);
        color: #00131d;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
        margin-top: 30px;
    }

    .save-btn:hover {
        box-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
    }
</style>
</head>

<body>

<div class="particles"></div>

<nav>
    <div class="nav-left">
        <img src="assets/images/logo.png" class="nav-logo">
        <span style="color: white; font-weight: 600;">MedVerse AI</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="#" style="color:white;">Account</a>
    </div>
</nav>


<div class="account-container">
    
    <!-- Sidebar (Left) -->
    <aside class="sidebar">
        <div class="profile-summary">
            <div class="avatar-placeholder">
                <!-- User Icon -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h3 class="profile-name">John Doe</h3>
            <p class="profile-email">johndoe@email.com</p>
        </div>

        <div class="sidebar-menu">
            <a href="#" class="menu-item active">Personal Information</a>
        </div>
    </aside>

    <!-- Content Area (Right) -->
    <main class="content-area">
        <button class="sign-out-btn" onclick="logout()">Sign out</button>

        <div class="content-header">
            <h1 class="page-title">Personal information</h1>
            <p class="page-subtitle">Manage your personal details and account preferences.</p>
        </div>

        <div class="info-grid">
            <!-- Card 1: Name -->
            <div class="info-card">
                <div class="card-data">
                    <span class="card-label">Name</span>
                    <input type="text" class="card-value-input" value="John Doe">
                </div>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>

            <!-- Card 2: DOB -->
            <div class="info-card">
                <div class="card-data">
                    <span class="card-label">Date of Birth</span>
                    <input type="text" class="card-value-input" value="22 Aug, 1996">
                </div>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>

            <!-- Card 3: Email -->
            <div class="info-card">
                <div class="card-data">
                    <span class="card-label">Email Address</span>
                    <input type="email" class="card-value-input" value="johndoe@email.com">
                </div>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>

            <!-- Card 4: Phone -->
            <div class="info-card">
                <div class="card-data">
                    <span class="card-label">Mobile Number</span>
                    <input type="tel" class="card-value-input" value="+91 98765 43210">
                </div>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </div>

            <!-- Card 5: User ID -->
            <div class="info-card">
                <div class="card-data">
                    <span class="card-label">User ID</span>
                    <span class="card-value">MVX-239482</span>
                </div>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

        </div>

        <button class="save-btn" onclick="saveAccountDetails()">Save Changes</button>
    </main>
</div>

<div class="disclaimer">
    Not a Medical Diagnosis. Consult a Professional.
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
