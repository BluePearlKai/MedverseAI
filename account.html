<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVerse AI - Account</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* This ensures the layout follows the 2-column sidebar format */
        body { display: block !important; overflow-y: auto !important; background: #00080d; color: white; }
        .account-container { display: flex; max-width: 1200px; margin: 40px auto; padding: 0 20px; gap: 40px; }
        .sidebar { width: 280px; flex-shrink: 0; }
        .content-area { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 234, 255, 0.2); border-radius: 24px; padding: 40px; position: relative; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .info-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-label { display: block; font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 5px; }
        .card-value-input { background: transparent; border: none; color: white; font-size: 16px; width: 100%; outline: none; font-weight: 600; }
        .sign-out-btn { position: absolute; top: 40px; right: 40px; background: rgba(255, 75, 43, 0.1); border: 1px solid #ff4b2b; color: #ff4b2b; padding: 8px 20px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="assets/images/logo.png" class="nav-logo">
        <span style="font-weight: 600;">MedVerse AI</span>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="account.html" class="active">Account</a>
    </div>
</nav>

<div class="account-container">
    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background: rgba(0, 234, 255, 0.1); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: #00eaff;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h3 id="sidebarName" style="margin: 5px 0;">Loading...</h3>
            <p id="sidebarEmail" style="color: #9ca3af; font-size: 14px;">please wait...</p>
        </div>
        <div class="menu-item active" style="padding: 15px; background: rgba(0, 234, 255, 0.1); color: #00eaff; border-radius: 12px; border-left: 3px solid #00eaff;">
            Personal Information
        </div>
    </aside>

    <main class="content-area">
        <button class="sign-out-btn" onclick="logout()">Sign out</button>
        
        <h1>Personal information</h1>
        <p style="color: #9ca3af;">Manage your personal details and account preferences.</p>

        <div class="info-grid">
            <div class="info-card">
                <div>
                    <span class="card-label">Name</span>
                    <input type="text" id="accName" class="card-value-input" readonly>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>

            <div class="info-card">
                <div>
                    <span class="card-label">Email Address</span>
                    <input type="email" id="accEmail" class="card-value-input" readonly>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path></svg>
            </div>

            <div class="info-card">
                <div>
                    <span class="card-label">User ID</span>
                    <span id="accID" style="font-weight: 600;">MV-0000</span>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>

            <div class="info-card">
                <div>
                    <span class="card-label">Mobile Number</span>
                    <input type="text" class="card-value-input" value="+91 00000 00000">
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67"></path></svg>
            </div>
        </div>
    </main>
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
